{{- range $key, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  labels:
    app: {{ $svc.name }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: {{ $svc.name }}
        dapr.io/app-port: "{{ $svc.port }}"
    spec:
      containers:
        - name: {{ $svc.name }}
          image: "{{ $svc.image }}:{{ $svc.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          env:
            - name: POSTGRES_HOST
              value: {{ $.Values.postgresql.host | quote }}
            - name: POSTGRES_PORT
              value: {{ $.Values.postgresql.port | quote }}
            - name: POSTGRES_DB
              value: {{ $.Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ $.Values.postgresql.user | quote }}
            - name: JWT_SECRET_KEY
              value: {{ $.Values.jwt.secretKey | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ $svc.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
