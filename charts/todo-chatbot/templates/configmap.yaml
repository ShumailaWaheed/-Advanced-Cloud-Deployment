apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-chatbot-config
data:
  ENVIRONMENT: {{ .Values.global.environment }}
  KAFKA_BROKERS: {{ .Values.kafka.brokers }}
  POSTGRES_HOST: {{ .Values.postgresql.host }}
  POSTGRES_PORT: {{ .Values.postgresql.port | quote }}
  POSTGRES_DB: {{ .Values.postgresql.database }}
